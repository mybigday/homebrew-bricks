name: Update casks

# Polls each cask's release/beta channel and opens a bump PR when a newer build
# is published. The monorepo's own upload-release.js is untouched — this tap is
# the only thing that watches the CDN.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cask:
          - bricks-desktop-foundation
          - bricks-ctor
          - bricks-ctor-beta
    steps:
      - uses: actions/checkout@v4

      # update-cask.rb prints the new version (and patches the file) only when the
      # channel is ahead; it exits non-zero on a real failure such as a dual-arch
      # cask caught mid-publish with only one architecture available.
      - name: Check channel and patch cask
        id: update
        run: |
          new_version="$(ruby scripts/update-cask.rb "Casks/${{ matrix.cask }}.rb")"
          if [ -n "$new_version" ]; then
            echo "version=$new_version" >> "$GITHUB_OUTPUT"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.update.outputs.changed == 'true'
        env:
          # A PAT (or GitHub App token) lets the audit workflow run on the PR and
          # makes --auto merge meaningful; GITHUB_TOKEN-authored PRs don't trigger
          # other workflows, so without TAP_PAT the PR is opened for a human.
          GH_TOKEN: ${{ secrets.TAP_PAT || secrets.GITHUB_TOKEN }}
        run: |
          cask="${{ matrix.cask }}"
          version="${{ steps.update.outputs.version }}"
          branch="update/${cask}-${version}"

          # Already handled in a previous run? (open PR == pushed branch here)
          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            echo "branch $branch already exists; nothing to do"
            exit 0
          fi

          git config user.name "bricks-cask-bot"
          git config user.email "bot@bricks.tools"
          git switch -c "$branch"
          git add "Casks/${cask}.rb"
          git commit -m "chore(${cask}): update to ${version}"
          git push origin "$branch"

          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore(${cask}): update to ${version}" \
            --body "Automated bump of \`${cask}\` to \`${version}\`, opened by the update-casks workflow."

          # Requires "Allow auto-merge" + a required status check (audit) on the repo.
          gh pr merge "$branch" --auto --squash \
            || echo "auto-merge unavailable; leaving PR open for manual merge"
